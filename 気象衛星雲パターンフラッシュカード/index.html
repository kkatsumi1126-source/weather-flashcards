<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>気象衛星雲パターンフラッシュカード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>気象衛星雲パターンフラッシュカード</h1>
      <p id="progress" class="progress">1 / 24</p>
    </header>

    <section class="filter-panel" aria-label="カードの種類">
      <button class="filter-button active" type="button" data-filter="すべて">すべて</button>
      <button class="filter-button" type="button" data-filter="雲パターン">雲パターン</button>
      <button class="filter-button" type="button" data-filter="意味">意味</button>
      <button class="filter-button" type="button" data-filter="見たら考えること">見たら考えること</button>
      <button class="filter-button" type="button" data-filter="試験ポイント">試験ポイント</button>
      <button class="filter-button" type="button" data-filter="略語">略語</button>
    </section>

    <section class="card-zone">
      <button id="flashcard" class="flashcard" type="button" aria-label="カードをめくる">
        <span class="card-inner">
          <span class="card-face card-front">
            <span id="categoryLabel" class="category-label">雲パターン</span>
            <span id="frontText" class="front-text">クラウドクラスターとは？</span>
          </span>
          <span id="backArea" class="card-face card-back">
            <span id="backCategoryLabel" class="category-label answer-label">答え</span>
            <span id="backText" class="back-text">積乱雲 Cb が集まってできた大きな雲のかたまり</span>
            <span id="noteText" class="note-text">大雨・雷・激しい対流に注意します。</span>
          </span>
        </span>
      </button>
    </section>

    <section class="memory-controls" aria-label="学習結果">
      <button id="rememberedButton" class="memory-button remembered" type="button">覚えた</button>
      <button id="againButton" class="memory-button again" type="button">もう一度</button>
    </section>

    <nav class="controls" aria-label="カード操作">
      <button id="prevButton" type="button">前へ</button>
      <button id="flipButton" type="button">答えを見る</button>
      <button id="nextButton" type="button">次へ</button>
      <button id="shuffleButton" type="button">シャッフル</button>
      <button id="restartButton" type="button">最初から</button>
    </nav>

    <footer class="stats-panel">
      <div class="stats">
        <span>覚えた: <strong id="rememberedCount">0</strong>枚</span>
        <span>もう一度: <strong id="againCount">0</strong>枚</span>
      </div>
      <button id="resetButton" class="reset-button" type="button">学習記録をリセット</button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
