<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国際式天気記号フラッシュカード</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="images.css">
</head>
<body>
  <main class="app">
    <header class="app-header"><h1>国際式天気記号フラッシュカード</h1><p id="progress" class="progress"></p></header>
    <section id="filters" class="filter-panel" aria-label="カードの種類"></section>
    <section class="card-zone">
      <button id="flashcard" class="flashcard" type="button" aria-label="カードをめくる"><span class="card-inner">
        <span class="card-face card-front"><span id="categoryLabel" class="category-label"></span><span id="frontText" class="front-text"></span></span>
        <span class="card-face card-back"><span id="backCategoryLabel" class="category-label answer-label">答え</span><span id="backText" class="back-text"></span><span id="noteText" class="note-text"></span></span>
      </span></button>
    </section>
    <section class="memory-controls"><button id="rememberedButton" class="memory-button remembered">覚えた</button><button id="againButton" class="memory-button again">もう一度</button></section>
    <nav class="controls"><button id="prevButton">前へ</button><button id="flipButton">答えを見る</button><button id="nextButton">次へ</button><button id="shuffleButton">シャッフル</button><button id="restartButton">最初から</button></nav>
    <footer class="stats-panel"><div class="stats"><span>覚えた: <strong id="rememberedCount">0</strong>枚</span><span>もう一度: <strong id="againCount">0</strong>枚</span></div><button id="resetButton" class="reset-button">学習記録をリセット</button></footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
