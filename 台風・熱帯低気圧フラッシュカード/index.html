<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台風・熱帯低気圧フラッシュカード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>台風・熱帯低気圧フラッシュカード</h1>
      <p id="progress" class="progress">1 / 62</p>
    </header>

    <section class="filter-panel" aria-label="カードの種類">
      <button class="filter-button active" type="button" data-filter="すべて">すべて</button>
      <button class="filter-button" type="button" data-filter="定義">定義</button>
      <button class="filter-button" type="button" data-filter="大きさ">大きさ</button>
      <button class="filter-button" type="button" data-filter="強さ">強さ</button>
      <button class="filter-button" type="button" data-filter="英文">英文</button>
      <button class="filter-button" type="button" data-filter="略号">略号</button>
      <button class="filter-button" type="button" data-filter="整理">整理</button>
      <button class="filter-button" type="button" data-filter="分類表">分類表</button>
      <button class="filter-button" type="button" data-filter="中心確度">中心確度</button>
    </section>

    <section class="card-zone">
      <button id="flashcard" class="flashcard" type="button" aria-label="カードをめくる">
        <span class="card-inner">
          <span class="card-face card-front">
            <span id="categoryLabel" class="category-label">定義</span>
            <span id="frontText" class="front-text">台風とは？</span>
          </span>
          <span class="card-face card-back">
            <span id="backCategoryLabel" class="category-label answer-label">定義の答え</span>
            <span id="backText" class="back-text">北西太平洋または南シナ海にある広義の熱帯低気圧のうち、最大風速がおよそ34KT以上のもの。</span>
          </span>
        </span>
      </button>
    </section>

    <section class="memory-controls" aria-label="学習結果">
      <button id="rememberedButton" class="memory-button remembered" type="button">覚えた</button>
      <button id="againButton" class="memory-button again" type="button">もう一度</button>
    </section>

    <nav class="controls" aria-label="カード操作">
      <button id="prevButton" type="button">前へ</button>
      <button id="flipButton" type="button">答えを見る</button>
      <button id="nextButton" type="button">次へ</button>
      <button id="shuffleButton" type="button">シャッフル</button>
      <button id="restartButton" type="button">最初から</button>
    </nav>

    <footer class="stats-panel">
      <div class="stats">
        <span>覚えた: <strong id="rememberedCount">0</strong>枚</span>
        <span>もう一度: <strong id="againCount">0</strong>枚</span>
      </div>
      <button id="resetButton" class="reset-button" type="button">学習記録をリセット</button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
